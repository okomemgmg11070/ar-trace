<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>固定式トレースツール v2</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 背面のカメラ映像 */
        #video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }

        /* UIパネル */
        .ui-wrapper {
            position: fixed; top: 10px; left: 10px; z-index: 100;
        }

        /* 開閉ボタン */
        #toggle-ui {
            background: #333; color: white; border: 1px solid #fff; border-radius: 5px;
            padding: 8px 12px; font-size: 14px; margin-bottom: 5px; cursor: pointer;
        }

        .controls {
            background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px;
            width: 220px; display: block; /* 初期状態は表示 */
        }

        .controls label { display: block; margin-top: 10px; font-size: 12px; }
        .controls input { width: 100%; margin-top: 5px; }
        
        #reset-btn {
            margin-top: 15px; width: 100%; padding: 8px; background: #e74c3c;
            color: white; border: none; border-radius: 5px; font-weight: bold;
        }

        /* 変形コンテナ */
        #warp-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        #overlay-img { position: absolute; display: none; transform-origin: 0 0; pointer-events: none; }

        /* 操作ハンドル（見えやすいように少し大きく、色を変更） */
        .handle {
            width: 44px; height: 44px; background: rgba(0, 255, 255, 0.4);
            border: 2px solid #fff; border-radius: 50%; position: absolute;
            z-index: 110; pointer-events: auto; transform: translate(-22px, -22px);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>

    <div class="ui-wrapper">
        <button id="toggle-ui">メニューを隠す</button>
        <div id="controls-panel" class="controls">
            <label>1. 画像を選択</label>
            <input type="file" id="fileInput" accept="image/*">
            
            <label>2. 透明度</label>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="0.5">
            
            <button id="reset-btn">位置をリセット</button>
            <p style="font-size: 10px; color: #ccc; margin-top: 10px;">※青い丸をドラッグしてパースを調整してください</p>
        </div>
    </div>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>お絵描きトレースAR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* スライダーを画面上部に固定するデザイン */
      .ui-container {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        z-index: 1000; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px;
        width: 80%; text-align: center;
      }
      input[type=range] { width: 100%; }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div class="ui-container">
      <label>透明度 (Opacity)</label>
      <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="0.5">
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker preset="hiro">
        <a-image 
          id="traceImage"
          src="https://raw.githubusercontent.com/aframevr/aframe/master/examples/image-tracking/nft/trex/trex-image-big.png" 
          position="0 0 0" 
          rotation="-90 0 0" 
          width="2" height="2"
          opacity="0.5">
        </a-image>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // スライダーを動かした時に画像の透明度を変える
      const slider = document.getElementById('opacitySlider');
      const image = document.getElementById('traceImage');
      slider.addEventListener('input', (e) => {
        image.setAttribute('material', 'opacity', e.target.value);
      });
    </script>
  </body>
</html>
